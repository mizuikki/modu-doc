name: e2e

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            curl build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file xvfb
          if apt-cache show webkit2gtk-driver >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends --no-install-suggests webkit2gtk-driver
          elif apt-cache show webkitgtk-webdriver >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends --no-install-suggests webkitgtk-webdriver
          else
            echo "Neither webkit2gtk-driver nor webkitgtk-webdriver is available on this runner." >&2
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install --path tools/tauri-driver --locked

      - name: Run e2e
        run: npm run e2e
