name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            curl build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file \
            pkg-config libglib2.0-dev
      - run: npm ci
      - run: npm run notice:check
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  e2e-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            curl build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file xvfb
          if apt-cache show webkit2gtk-driver >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends --no-install-suggests webkit2gtk-driver
          elif apt-cache show webkitgtk-webdriver >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends --no-install-suggests webkitgtk-webdriver
          else
            echo "Neither webkit2gtk-driver nor webkitgtk-webdriver is available on this runner." >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Avoid flaky/locked global cache paths on Windows runners.
          $env:npm_config_cache = Join-Path $env:RUNNER_TEMP "npm-cache"
          New-Item -ItemType Directory -Force -Path $env:npm_config_cache | Out-Null

          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "npm ci (attempt $attempt/$maxAttempts)"
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "npm ci failed after $maxAttempts attempts (exit=$LASTEXITCODE)"
            }

            Write-Host "npm ci failed (exit=$LASTEXITCODE); cleaning cache and retrying."
            npm cache clean --force
            Start-Sleep -Seconds 3
          }

      - name: Install tauri-driver
        run: cargo install --path tools/tauri-driver --locked

      - name: Run e2e
        run: npm run e2e
        env:
          MODUDOC_E2E_WINDOWS_STRATEGY: attach

  e2e-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Edge WebDriver
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          if (!(Test-Path -Path "msedgedriver.exe")) {
            throw "msedgedriver-tool did not write msedgedriver.exe to the current directory."
          }
          echo "$PWD" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          echo "$HOME/.cargo/bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install --path tools/tauri-driver --locked

      - name: Run e2e
        run: npm run e2e

  tauri-build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            curl build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: npm ci
      - run: npm run tauri:build
